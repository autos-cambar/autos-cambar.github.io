<!doctype html>
<html lang="es-CR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#07080C" />

  <!-- Primary SEO -->
  <title>Autos Cambar | Catálogo</title>
  <meta name="description" content="Catálogo de Autos Cambar. Vehículos y motos - ficha técnica." />
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
  <link rel="canonical" href="https://autos-cambar.github.io/" />

  <!-- Favicons / App identity -->
  <link rel="icon" href="./logo.webp" type="image/webp" />
  <link rel="apple-touch-icon" href="./logo.webp" />
  <meta name="theme-color" content="#07080C" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Autos Cambar" />
  <meta property="og:locale" content="es_CR" />
  <meta property="og:title" content="Autos Cambar | Catálogo" />
  <meta property="og:description" content="Catálogo de Autos Cambar. Vehículos y motos - ficha técnica." />
  <meta property="og:url" content="https://autos-cambar.github.io/" />
  <meta property="og:image" content="https://autos-cambar.github.io/logo.webp" />
  <meta property="og:image:secure_url" content="https://autos-cambar.github.io/logo.webp" />
  <meta property="og:image:type" content="image/webp" />
  <meta property="og:image:alt" content="Logo de Autos Cambar" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Autos Cambar | Catálogo" />
  <meta name="twitter:description" content="Catálogo de Autos Cambar. Vehículos y motos - ficha técnica." />
  <meta name="twitter:image" content="https://autos-cambar.github.io/logo.webp" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
    <symbol id="i-home" viewBox="0 0 24 24">
      <path d="M3 10.5 12 3l9 7.5"></path>
      <path d="M5 10v10h14V10"></path>
    </symbol>
    <symbol id="i-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"></circle>
      <path d="M20 20l-3.5-3.5"></path>
    </symbol>
    <symbol id="i-whatsapp" viewBox="0 0 24 24">
      <path d="M7.5 20.5 4 21.5l1-3.6A9 9 0 1 1 21 12a9 9 0 0 1-13.5 8.5Z"></path>
      <path d="M9.2 8.9c.2-.5.5-.5.7-.5h.6c.2 0 .4.1.5.4l.8 1.9c.1.3.1.5-.1.7l-.5.5c-.2.2-.2.4 0 .7.4.7 1 1.4 1.7 1.9.3.2.5.2.7 0l.6-.6c.2-.2.4-.2.6-.1l2 .8c.3.1.4.3.4.5v.6c0 .2 0 .5-.5.7-.5.2-1.7.7-3.8-.2-2.4-1-4.2-3.7-4.3-4-.1-.3-.9-2.2-.2-3.8Z"></path>
    </symbol>
    <symbol id="i-filter" viewBox="0 0 24 24">
      <path d="M4 6h16"></path>
      <path d="M7 12h10"></path>
      <path d="M10 18h4"></path>
    </symbol>
    <symbol id="i-refresh" viewBox="0 0 24 24">
      <path d="M20 12a8 8 0 1 1-2.3-5.7"></path>
      <path d="M20 4v6h-6"></path>
    </symbol>
    <symbol id="i-photos" viewBox="0 0 24 24">
      <path d="M4 7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7Z"></path>
      <path d="M8 11a2 2 0 1 0 0 .01"></path>
      <path d="M4 16l4-4 3 3 3-3 4 4"></path>
    </symbol>
    <symbol id="i-list" viewBox="0 0 24 24">
      <path d="M8 6h13"></path>
      <path d="M8 12h13"></path>
      <path d="M8 18h13"></path>
      <path d="M3 6h.01"></path>
      <path d="M3 12h.01"></path>
      <path d="M3 18h.01"></path>
    </symbol>
    <symbol id="i-x" viewBox="0 0 24 24">
      <path d="M18 6 6 18"></path>
      <path d="M6 6l12 12"></path>
    </symbol>
  </svg>

  <header class="app-header" role="banner">
    <div class="header-left">
      <button id="brandHome" class="brand brand-link" type="button" aria-label="Autos Cambar, Inicio">
        <div class="brand-text">
          <div class="brand-name">Autos Cambar</div>
          <div class="brand-sub">Catálogo</div>
        </div>
      </button>
    </div>

    <div class="header-right">
      <button id="btnSearch" class="btn btn-ghost" type="button" aria-haspopup="dialog" aria-controls="filtersModal">
        <span class="icon" aria-hidden="true"><svg><use href="#i-search"></use></svg></span>
        Buscar
      </button>
    </div>
  </header>

  <main class="app-main" role="main">
    <section class="catalog-head">
      <div class="catalog-title">
        <h1 id="catalogH1">Disponibles</h1>
        <p id="resultsHint" class="muted">Cargando…</p>

        <div id="activeChips" class="active-chips" aria-label="Filtros activos"></div>
      </div>

      <div class="catalog-right">
        <div class="type-toggle" role="tablist" aria-label="Tipo de catálogo">
          <button id="btnTypeVehiculo" class="seg is-on" type="button" role="tab" aria-selected="true" data-type="vehiculo">
            Vehículos
          </button>
          <button id="btnTypeMoto" class="seg" type="button" role="tab" aria-selected="false" data-type="moto">
            Motos
          </button>
        </div>

        <div class="catalog-actions">
          <button id="btnResetFilters" class="btn btn-soft" type="button">
            <span class="icon" aria-hidden="true"><svg><use href="#i-refresh"></use></svg></span>
            Limpiar filtros
          </button>
        </div>
      </div>
    </section>

    <section id="catalog" class="catalog" aria-label="Listado del catálogo"></section>
  </main>

  <nav class="bottom-nav" aria-label="Navegación">
    <button id="navHome" class="nav-item is-active" type="button" aria-label="Inicio" aria-current="page">
      <span class="icon" aria-hidden="true"><svg><use href="#i-home"></use></svg></span>
      <span class="label">Inicio</span>
    </button>

    <button id="navSearch" class="nav-item" type="button" aria-label="Búsqueda">
      <span class="icon" aria-hidden="true"><svg><use href="#i-search"></use></svg></span>
      <span class="label">Buscar</span>
    </button>

    <a
      id="navWhatsapp"
      class="nav-item"
      href="https://wa.me/50661945512?text=Hola%2C%20me%20gustar%C3%ADa%20informaci%C3%B3n%20sobre%20el%20cat%C3%A1logo%20disponible.%20%C2%BFMe%20puede%20indicar%20disponibilidad%3F"
      target="_blank"
      rel="noopener"
      aria-label="WhatsApp"
    >
      <span class="icon" aria-hidden="true"><svg><use href="#i-whatsapp"></use></svg></span>
      <span class="label">WhatsApp</span>
    </a>
  </nav>

  <div id="gallery" class="overlay is-hidden" role="dialog" aria-modal="true" aria-label="Galería del ítem">
    <div class="overlay-backdrop" data-close="gallery" aria-hidden="true"></div>

    <div class="overlay-shell" role="document">
      <header class="overlay-header">
        <div class="overlay-title">
          <div id="galleryTitle" class="overlay-title-main">Catálogo</div>
          <div id="galleryMeta" class="overlay-title-sub muted">Foto 1 de 1</div>
        </div>

        <button id="btnCloseGallery" class="btn btn-ghost btn-icon" type="button" aria-label="Cerrar galería">
          <span class="icon" aria-hidden="true"><svg><use href="#i-x"></use></svg></span>
        </button>
      </header>

      <div class="story-progress" id="progress" aria-hidden="true"></div>

      <div class="story-stage" id="storyStage">
        <div id="storyTrack" class="story-track" aria-live="polite"></div>
      </div>

      <footer class="overlay-footer">
        <div class="cta-row">
          <a id="btnWhatsapp" class="btn btn-primary" href="#" target="_blank" rel="noopener">
            <span class="icon" aria-hidden="true"><svg><use href="#i-whatsapp"></use></svg></span>
            Agendar por WhatsApp
          </a>
          <button id="btnSpecs" class="btn btn-soft" type="button" aria-haspopup="dialog" aria-controls="specsModal">
            <span class="icon" aria-hidden="true"><svg><use href="#i-list"></use></svg></span>
            Ficha técnica
          </button>
        </div>

        <div class="mini-row">
          <div id="featuresRow" class="badges-row" aria-label="Características del ítem"></div>
        </div>
      </footer>
    </div>
  </div>

  <div id="filtersModal" class="modal is-hidden" role="dialog" aria-modal="true" aria-label="Buscar con filtros">
    <div class="modal-backdrop" data-close="filters" aria-hidden="true"></div>

    <div class="modal-card" role="document">
      <header class="modal-header">
        <div>
          <div class="modal-title">Buscar</div>
          <div class="muted">Filtros del catálogo</div>
        </div>
        <button class="btn btn-ghost btn-icon" type="button" data-close="filters" aria-label="Cerrar filtros">
          <span class="icon" aria-hidden="true"><svg><use href="#i-x"></use></svg></span>
        </button>
      </header>

      <div class="modal-body">
        <div class="filters-grid">

          <div class="filter-block">
            <div class="filter-label">Tipo</div>
            <div id="filterTypes" class="chips">
              <label class="chip" for="type-vehiculo" data-group="type">
                <input id="type-vehiculo" type="radio" name="filterType" value="vehiculo" />
                <span>Vehículos</span>
              </label>
              <label class="chip" for="type-moto" data-group="type">
                <input id="type-moto" type="radio" name="filterType" value="moto" />
                <span>Motos</span>
              </label>
            </div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Ordenar por</div>
            <div id="filterSort" class="chips">
              <label class="chip" for="sort-title-asc" data-group="sort">
                <input id="sort-title-asc" type="radio" name="filterSort" value="title-asc" />
                <span>Nombre A–Z</span>
              </label>
              <label class="chip" for="sort-title-desc" data-group="sort">
                <input id="sort-title-desc" type="radio" name="filterSort" value="title-desc" />
                <span>Nombre Z–A</span>
              </label>
              <label class="chip" for="sort-year-desc" data-group="sort">
                <input id="sort-year-desc" type="radio" name="filterSort" value="year-desc" />
                <span>Año: más nuevo</span>
              </label>
              <label class="chip" for="sort-year-asc" data-group="sort">
                <input id="sort-year-asc" type="radio" name="filterSort" value="year-asc" />
                <span>Año: más viejo</span>
              </label>
              <label class="chip" for="sort-price-asc" data-group="sort">
                <input id="sort-price-asc" type="radio" name="filterSort" value="price-asc" />
                <span>Precio: más barato</span>
              </label>
              <label class="chip" for="sort-price-desc" data-group="sort">
                <input id="sort-price-desc" type="radio" name="filterSort" value="price-desc" />
                <span>Precio: más caro</span>
              </label>
            </div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Marca</div>
            <div id="filterMakes" class="chips"></div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Caja</div>
            <div id="filterGearbox" class="chips">
              <label class="chip" for="gearbox-manual" data-group="gearbox">
                <input id="gearbox-manual" type="checkbox" value="manual" />
                <span>Manual</span>
              </label>
              <label class="chip" for="gearbox-automatica" data-group="gearbox">
                <input id="gearbox-automatica" type="checkbox" value="automatica" />
                <span>Automática</span>
              </label>
              <label class="chip" for="gearbox-shiftronic" data-group="gearbox">
                <input id="gearbox-shiftronic" type="checkbox" value="shiftronic" />
                <span>Shiftronic</span>
              </label>
            </div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Documentos</div>
            <div id="filterDocs" class="chips">
              <label class="chip" for="doc-dekra-2026" data-group="doc">
                <input id="doc-dekra-2026" type="checkbox" value="Dekra 2026" />
                <span>Dekra 2026</span>
              </label>
              <label class="chip" for="doc-marchamo-2026" data-group="doc">
                <input id="doc-marchamo-2026" type="checkbox" value="Marchamo 2026" />
                <span>Marchamo 2026</span>
              </label>
              <label class="chip" for="doc-rtv-2026" data-group="doc">
                <input id="doc-rtv-2026" type="checkbox" value="RTV 2026" />
                <span>RTV 2026</span>
              </label>
            </div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Negocio</div>
            <div id="filterDeal" class="chips">
              <label class="chip" for="deal-vendo" data-group="deal">
                <input id="deal-vendo" type="checkbox" value="VENDO" />
                <span>VENDO</span>
              </label>
              <label class="chip" for="deal-recibo" data-group="deal">
                <input id="deal-recibo" type="checkbox" value="RECIBO" />
                <span>RECIBO</span>
              </label>
              <label class="chip" for="deal-para-inscripcion" data-group="deal">
                <input id="deal-para-inscripcion" type="checkbox" value="para_inscripcion" />
                <span>Para inscripción</span>
              </label>
            </div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Año</div>
            <div class="range-row">
              <label class="field">
                <span class="field-label muted">Desde</span>
                <input id="yearMin" class="input" type="number" inputmode="numeric" placeholder="Ej: 1995" />
              </label>
              <label class="field">
                <span class="field-label muted">Hasta</span>
                <input id="yearMax" class="input" type="number" inputmode="numeric" placeholder="Ej: 2026" />
              </label>
            </div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Precio (CRC)</div>
            <div class="range-row">
              <label class="field">
                <span class="field-label muted">Mín</span>
                <input id="priceMin" class="input" type="number" inputmode="numeric" placeholder="Ej: 1500000" />
              </label>
              <label class="field">
                <span class="field-label muted">Máx</span>
                <input id="priceMax" class="input" type="number" inputmode="numeric" placeholder="Ej: 3000000" />
              </label>
            </div>

            <div class="preset-row" aria-label="Rangos rápidos">
              <button class="preset" type="button" data-price="lt-5000000">‹ ₡5M</button>
              <button class="preset" type="button" data-price="5000000-10000000">₡5M–₡10M</button>
              <button class="preset" type="button" data-price="10000000-20000000">₡10M–₡20M</button>
              <button class="preset" type="button" data-price="gt-20000000">› ₡20M</button>
            </div>
          </div>

          <div class="filter-block">
            <div class="filter-label">Opciones</div>
            <label class="toggle">
              <input id="onlyNegotiable" type="checkbox" />
              <span class="toggle-ui" aria-hidden="true"></span>
              <span>Solo negociables</span>
            </label>
          </div>

        </div>
      </div>

      <footer class="modal-footer">
        <button id="btnResetModal" class="btn btn-ghost" type="button">
          <span class="icon" aria-hidden="true"><svg><use href="#i-refresh"></use></svg></span>
          Restablecer
        </button>
        <div class="modal-footer-right">
          <button class="btn btn-soft" type="button" data-close="filters">
            <span class="icon" aria-hidden="true"><svg><use href="#i-x"></use></svg></span>
            Cancelar
          </button>

          <!-- FIX: no se destruye el icono con textContent -->
          <button id="btnApplyFilters" class="btn btn-primary" type="button" data-apply>
            <span class="icon" aria-hidden="true"><svg><use href="#i-filter"></use></svg></span>
            <span class="label">Aplicar</span>
            <span id="applyCount" class="muted">(0)</span>
          </button>
        </div>
      </footer>
    </div>
  </div>

  <div id="specsModal" class="modal is-hidden" role="dialog" aria-modal="true" aria-label="Ficha técnica">
    <div class="modal-backdrop" data-close="specs" aria-hidden="true"></div>

    <div class="modal-card modal-card--specs" role="document">
      <header class="modal-header">
        <div>
          <div id="specsTitle" class="modal-title">Ficha técnica</div>
          <div id="specsSubtitle" class="muted"></div>
        </div>
        <button class="btn btn-ghost btn-icon" type="button" data-close="specs" aria-label="Cerrar ficha técnica">
          <span class="icon" aria-hidden="true"><svg><use href="#i-x"></use></svg></span>
        </button>
      </header>

      <div class="modal-body">
        <div id="specsBody" class="specs"></div>
      </div>

      <footer class="modal-footer">
        <button class="btn btn-soft" type="button" data-close="specs">
          <span class="icon" aria-hidden="true"><svg><use href="#i-x"></use></svg></span>
          Cerrar
        </button>
      </footer>
    </div>
  </div>

  <footer class="site-footer" role="contentinfo">
    <div class="site-footer__inner">
      <div class="site-footer__brand">
        <img class="site-footer__logo" src="./logo.webp" alt="Autos Cambar" loading="lazy" />
        <div class="site-footer__text">
          <div class="site-footer__name">Autos Cambar</div>
          <div class="site-footer__sub muted">Catálogo de vehículos y motos</div>
        </div>
      </div>

      <div class="site-footer__meta">
        <div class="site-footer__copy">
          © <span id="footerYear"></span> Derechos reservados.
        </div>
        <div class="site-footer__locale muted">Costa Rica</div>

        <a
          id="footerWa"
          class="is-hidden"
          href="https://wa.me/50661945512?text=Hola%2C%20me%20gustar%C3%ADa%20informaci%C3%B3n%20sobre%20el%20cat%C3%A1logo%20disponible.%20%C2%BFMe%20puede%20indicar%20disponibilidad%3F"
          target="_blank"
          rel="noopener"
          aria-label="WhatsApp"
        ></a>
        <a id="footerHome" class="is-hidden" href="#"></a>
        <button id="footerTop" class="is-hidden" type="button"></button>
      </div>
    </div>
  </footer>

  <script src="./app.js" defer></script>
</body>
</html>
